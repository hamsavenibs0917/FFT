<html>
    <head>
        <title>Navigation Bar</title>
        <style>
            .nav{
            background-color: hwb(204 2% 58% / 0.69);
            padding: 10px;

            }
            .nav, ul{
            display: flex;
            gap: 30px;
            justify-content: flex-end;
            }
            body{
            padding: 0px;
            margin: 0px;
            }
            li{
            list-style-type: none;
            }
            img{
            width: 100px;
            height: 50px;
            border-radius: 5px;
            margin-right: 50px;
            }
            input{
            height: 30px;
            margin-top: 10px;
            }
            button{
            height: 30px;
            margin-top: 10px;
            border-radius: 5px;
            }
            button:hover{
            background-color: rgb(154, 13, 126);
            color: white;
            cursor: pointer;
            }
            a{
            text-decoration: none;

            }
        </style>
    </head>
    <body>
        <h1>Navigation Bar</h1>
        <div class="nav">
            <img src="logo.png" alt="logo" width="30px" height="30px">
                <input type="search" >
                <button>Search</button>
                <ul>
                    <li><a href="https://www.alliance.edu.in/">Home</a></li>
                    <li><a href="https://student.alliance.edu.in/auerp/StudentLogin.do">Login</a></li> 
                    <li><a href="https://www.alliance.edu.in/admissions/admissionprocess">Admissions</a></li>
                    <li><a href="https://www.alliance.edu.in/about-us/about-us">About </a></li>
                </ul>
            </div>
    </body>
</html>
