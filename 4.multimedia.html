<html>
    <head>
        <title>Multimedia Page</title>
        <style>
            body{
            
                padding :0px;
                margin:0px;
            }
            video{
                width: 100%;
                height: 100%;
            }
            img{
                width: 300px;
                height: 300px;
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <h1>Multimedia Content</h1>
        <video src = './video.mp4' loop autoplay muted></video>
        <audio src = './audio.mp3' autoplay muted loop playsinline controls></audio>
        <div class="images">
            <img src="./i.jpg" alt="Image 1">
            <img src="./i1.jpg" alt="Image 2">
            <img src="./i2.jpg" alt="Image 3" >
        </div>
    </body>
</html>
