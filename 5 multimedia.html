<html>
<head>
    <title>Multimedia Page - NewMe</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 30px;
            color: #333;
        }

        p {
            color: #555;
            margin-bottom: 15px;
        }

        audio, video {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>NewMe Multimedia Page</h1>

        <h2>Relaxing Audio</h2>
        <p>Listen to this relaxing background music for a peaceful experience.</p>
        <audio src = './audio.mp3' autoplay loop playsinline controls>
            Your browser does not support the audio element.
        </audio>

        <h2>Nature Video</h2>
        <p>Watch this beautiful nature video with full controls enabled.</p>
            <video src = './video.mp4' loop autoplay muted>
            Your browser does not support the video element.
            </video>
    </div>

</body>
</html>
