<html>
    <head>
        <title>Simple Calculator</title>
        <link rel="stylesheet" href="5.simple_calculator.css">
    </head>
    <body>
        <h1>Simple Calculator</h1>
        <div class="calculator">
            <input type="number" id="num1" placeholder="Enter first number">

            <input type="number" id="num2" placeholder="Enter second number">
        </div>
        <div class="buttons">
            <button onclick="add()">+</button>
            <button onclick="sub()">-</button>
            <button onclick="mul()">*</button>
            <button onclick="div()">/</button>
            <button onclick="mod()">%</button>
        </div>
        <p id="result"></p>
        </div>
        <script>
            const getValues = () =>{
                let a = parseFloat(document.getElementById("num1").value);
                let b = parseFloat(document.getElementById("num2").value);
                return [a,b];
            }
            const add = () =>{
                let [a,b] = getValues();
                document.getElementById("result").innerHTML="Addition = "+(a+b);
            }
            const sub = () =>{
                let [a,b] = getValues();
                document.getElementById("result").innerHTML="Subtraction = "+(a-b);
            }
            const mul = () =>{
                let [a,b] = getValues();
                document.getElementById("result").innerHTML="Multiplication = "+(a*b);
            }
            const div = () =>{
                let [a,b] = getValues();
                document.getElementById("result").innerHTML="Division = "+(a/b);
            }
            const mod = () =>{
                let [a,b] = getValues();
                document.getElementById("result").innerHTML="Modulus = "+(a%b);
            }
        </script>
    </body>
</html>
