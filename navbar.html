<html>
    <head>
        <title>Nav Bar</title>
        <style>
            body{
                padding :0px;
                margin:0px;
            }
            .nav{
                background-color: hwb(204 2% 58% / 0.69);
                padding: 10px;
            }
            .nav,ul{
                display: flex;
                gap: 40px;
                justify-content: flex-end;
            }
            li{
                list-style-type:none; 
            }
            img{
                width: 350px;
                height: 60px;
                margin-right : 150px;
            }
            input{
                width : 270px;
                height : 30px;
                margin-top: 10px;
            }
            button{
                height : 30px;
                margin-top:10px;
                cursor :pointer;
            }
            button:hover{
                background-color: hsl(0, 1%, 62%);
            }
            a{
                text-decoration: none;
            }

        </style>
    </head>
    <body>
        <div class = 'nav'>
            <img src="./okay.png" alt="">
            <input type = 'text'>
            <button>Search</button>
            <ul>
                <li><a href='https://en.wikipedia.org/wiki/Gypsy,_Oklahoma'>Home</a></li>
                <li><a href='https://en.wikipedia.org/wiki/Menu'>Menu</a></li>
                <li><a href='https://en.wikipedia.org/wiki/Services'>Services</a></li>
                <li><a href='https://en.wikipedia.org/wiki/About'>About</a></li>
            </ul>
        </div>

        </div>
    </body>
</html>
